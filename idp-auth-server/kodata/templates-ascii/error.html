<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <main class="page">
      <pre class="banner">+================+
|     ERROR      |
+================+</pre>

      <section class="ascii-card">
        <p class="ascii-line">+------------------------------------------------------------+</p>
        <div class="ascii-row"><span class="edge">|</span><div class="content title danger">ERROR</div><span class="edge">|</span></div>
        <div class="ascii-row"><span class="edge">|</span><div class="content danger">{{.Text}}</div><span class="edge">|</span></div>
        <p class="ascii-line">+------------------------------------------------------------+</p>
      </section>
    </main>
  </body>
</html>
