<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  <body>
    <main class="page">
      <div class="avatar" aria-hidden="true">
        {{if .AvatarURL}}
        <img src="{{.AvatarURL}}" alt="User avatar" width="54" height="54">
        {{else}}
        <svg viewBox="0 0 16 16">
          <path d="M10.561 8.073a3.5 3.5 0 1 0-5.122 0A5 5 0 0 0 3 12.5a.75.75 0 0 0 1.5 0 3.5 3.5 0 1 1 7 0 .75.75 0 0 0 1.5 0 5 5 0 0 0-2.439-4.427M8 7a2 2 0 1 1 0-4 2 2 0 0 1 0 4"></path>
        </svg>
        {{end}}
      </div>
      <h1 class="heading">Authorize</h1>
      <form class="card" action="/approve" method="post">
        <p class="meta">Approve this client?</p>
        <p class="meta"><strong>{{.ClientID}}</strong></p>
        <p class="meta">For these scopes:</p>
        <p class="meta"><strong>{{.Scope}}</strong></p>
        {{if .ErrorText}}
        <p class="error">{{.ErrorText}}</p>
        {{end}}

        <label for="id-token-claims">ID Token Claims</label>
        <textarea id="id-token-claims" name="id_token_claims_json" class="claims-editor">{{.IDTokenClaimsJSON}}</textarea>

        <label for="access-token-claims">Access Token Claims</label>
        <textarea id="access-token-claims" name="access_token_claims_json" class="claims-editor">{{.AccessTokenClaimsJSON}}</textarea>

        <div class="btn-row">
          <button class="btn btn-primary" type="submit" name="approve" autofocus>Approve</button>
          <button class="btn btn-danger" type="submit" name="deny">Deny</button>
        </div>
        <input type="hidden" name="reqid" value="{{.ReqID}}">
      </form>
    </main>
  </body>
</html>
